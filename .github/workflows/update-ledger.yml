name: Update Baseball Morning Ledger

on:
  schedule:
    - cron: "17 9 * * *"
    - cron: "47 9 * * *"
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-ledger
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Update daily data
        run: node scripts/fetch-yesterday.js

      - name: Check for updated data
        id: data-changes
        run: |
          git add data/yesterday.json data/yesterday-data.js
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.data-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Update daily ledger data"
          git push

      - name: Create Buttondown draft
        if: steps.data-changes.outputs.changed == 'true' && env.BUTTONDOWN_API_KEY != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: node scripts/create-buttondown-draft.js
