name: Update Baseball Morning Ledger

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-ledger
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Update daily data
        run: node scripts/fetch-yesterday.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/yesterday.json data/yesterday-data.js
          git diff --cached --quiet || git commit -m "Update daily ledger data"
          git push

      - name: Create Buttondown draft
        if: env.BUTTONDOWN_API_KEY != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: node scripts/create-buttondown-draft.js
