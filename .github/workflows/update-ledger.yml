name: Update Baseball Morning Ledger

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update daily data
        run: node scripts/fetch-yesterday.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/yesterday.json data/yesterday-data.js
          git diff --cached --quiet || git commit -m "Update daily ledger data"
          git push
